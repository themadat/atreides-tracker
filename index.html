<!DOCTYPE html>
<html lang="en">

<head>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Atreides Tracker - Interactive</title>
    <style>
        :root {
            --bg: #111315;
            --panel: #1b1f24;
            --panel-2: #222831;
            --grid: #555;
            --text: #f3f4f6;
            --muted: #b5bcc8;
            --sticky: #d8d8d8;
            --cell: #efefef;
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: linear-gradient(180deg, #0d0f12, #161a20 40%, #0f1217);
            color: var(--text);
            margin: 0;
        }

        .app {
            /* 1160 for iPad Air 11"; 1400 for 13" */
            max-width: 1600px;
            height: 100vh;
            margin: 0 auto;
            padding: 2px;
        }

        .hero {
            display: block;
            margin-bottom: 2px;
        }

        .card {
            background: rgba(27, 31, 36, .92);
            border: 1px solid rgba(255, 255, 255, .08);
            border-radius: 8px;
            padding: 2px;
            box-shadow: 0 16px 36px rgba(0, 0, 0, .28);
            backdrop-filter: blur(10px);
            position: relative;
        }

        .other-option-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #171b21;
            border: 1px solid rgba(255, 255, 255, .14);
            color: #fff;
            border-radius: 10px;
            padding: 4px 10px;
            font-size: .8rem;
            text-decoration: none;
            font-weight: 700;
        }

        .other-option-btn:hover {
            transform: translateY(-1px);
        }

        h1 {
            margin: 0;
            font-size: 1.9rem;
            letter-spacing: .03em;
        }

        .subtitle {
            color: var(--muted);
            margin: 0;
            line-height: 1;
        }

        .toolbar {
            display: grid;
            grid-template-columns: 1.3fr 0.5fr 3.2fr;
            gap: 16px;
            align-items: end;
        }

        .small-field {
            width: 200px;
            min-width: 200px;
        }

        .small-field select {
            min-width: 200px;
            padding: 4px 10px;
            font-size: .9rem;
        }

        .search-field input {
            padding: 4px 10px;
        }

        .field label {
            display: block;
            font-size: .8rem;
            color: var(--muted);
            margin-bottom: 4px;
            text-transform: uppercase;
            letter-spacing: .06em;
        }

        .field input,
        .field select,
        .field button,
        .field textarea {
            width: 100%;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, .1);
            background: #0f1318;
            color: var(--text);
            padding: 4px 10px;
            font: inherit;
        }

        button {
            cursor: pointer;
            transition: transform .12s ease, opacity .12s ease;
        }

        button:hover {
            transform: translateY(-1px);
        }

        button.secondary {
            background: #171b21;
        }

        button.warn {
            background: #442525;
        }

        .summary-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 2px;
            margin-top: 2px;
            max-height: 340px;
            overflow: auto;
        }
        .summary-grid .pill {
            min-height: 28px;
            padding-top: 4px;
            padding-bottom: 4px;
            line-height: 1;
        }

        .summary-actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 2px;
            align-items: center;
        }

        .summary-actions .pill {
            justify-content: center;
            min-width: 104px;
            min-height: 28px;
            font-weight: 700;
            padding: 4px 10px;
            line-height: 1;
        }

        .summary-actions .pill.reset-pill {
            background: #111;
            border-color: rgba(255, 255, 255, .14);
        }

        .summary-actions .pill.clear-pill {
            background: #666;
            border-color: rgba(255, 255, 255, .14);
        }

        .summary-actions .pill.confirming {
            box-shadow: inset 0 0 0 2px rgba(255, 255, 255, .65);
            transform: none;
        }

        .summary-actions .pill.deck-pill {
            background: #5a3416;
            border-color: rgba(255, 255, 255, .14);
        }

        .summary-actions .pill.discard-pill {
            background: #a87442;
            border-color: rgba(255, 255, 255, .14);
        }

        .summary-actions .pill.expansion-pill-base {
            background: #272727;
            border-color: rgba(255, 255, 255, .14);
        }

        .summary-actions .pill.expansion-pill-exp1 {
            background: #8f6d39;
            border-color: rgba(255, 255, 255, .14);
        }

        .summary-actions .pill.expansion-pill-exp2 {
            background: #ac1b6b;
            border-color: rgba(255, 255, 255, .14);
        }

        .summary-actions .pill.expansion-pill-exp3 {
            background: #6f2fb4;
            border-color: rgba(255, 255, 255, .14);
        }

        .summary-actions .pill.filter-pill {
            background: #171b21;
            border-color: rgba(255, 255, 255, .14);
        }

        .summary-actions .pill.export-pill,
        .summary-actions .pill.import-pill {
            background: #171b21;
            border-color: rgba(255, 255, 255, .14);
        }

        .summary-actions .actions-separator {
            width: 1px;
            height: 32px;
            background: rgba(255, 255, 255, .18);
            margin: 0 4px;
            flex: 0 0 auto;
        }

        .summary-actions .expansion-separator {
            width: 1px;
            height: 32px;
            background: rgba(255, 255, 255, .18);
            margin: 0 4px;
            flex: 0 0 auto;
        }

        .summary-actions .pill.expansion-pill-base,
        .summary-actions .pill.expansion-pill-exp1,
        .summary-actions .pill.expansion-pill-exp2,
        .summary-actions .pill.expansion-pill-exp3 {
            min-width: 64px;
            padding: 4px 10px;
        }

        .pill {
            background: rgba(255, 255, 255, .05);
            border-radius: 10px;
            padding: 8px 10px;
            display: flex;
            justify-content: space-between;
            gap: 4px;
            align-items: center;
            font-size: .9rem;
            cursor: pointer;
            border: 1px solid transparent;
            user-select: none;
            transition: transform .12s ease, border-color .12s ease, background .12s ease, opacity .12s ease;
        }

        .pill[data-toggle-table-scale] {
            border: 2px solid rgba(255, 255, 255, 0.55);
            font-weight: 400;
        }

        .pill[data-toggle-table-scale].big-active {
            font-weight: 700;
        }

        .pill[data-toggle-table-scale].bigger-active {
            font-weight: 1000;
            font-size: 1.25rem;
        }

        #trackerTable.table-scale-big~* .pill[data-toggle-table-scale],
        .pill[data-toggle-table-scale]:focus {
            border: 2px solid #ffffff;
        }

        /* Light outline when expansion columns are hidden */
        .pill[data-toggle-expansion-columns].inactive {
            border: 2px solid rgba(255, 255, 255, 0.35);
        }

        .pill:hover {
            transform: translateY(-1px);
        }

        .pill.active {
            background: rgba(255, 255, 255, .11);
            border-color: rgba(255, 255, 255, .2);
        }

        .pill.inactive {
            opacity: .25;
        }

        .expansion-pill-base {
            background: #272727;
            border-color: rgba(255, 255, 255, .14);
        }

        .expansion-pill-exp1 {
            background: #8f6d39;
            border-color: rgba(255, 255, 255, .14);
        }

        .expansion-pill-exp2 {
            background: #ac1b6b;
            border-color: rgba(255, 255, 255, .14);
        }

        .expansion-pill-exp3 {
            background: #6f2fb4;
            border-color: rgba(255, 255, 255, .14);
        }

        .pill,
        .pill strong,
        .pill span,
        .pill label,
        .pill small {
            color: #fff;
        }

        .table-wrap {
            background: rgba(27, 31, 36, .94);
            border: 1px solid rgba(255, 255, 255, .08);
            border-radius: 0;
            padding: 0;
            padding-bottom: 20px;
            overflow: auto;
            box-shadow: 0 16px 36px rgba(0, 0, 0, .28);
            position: relative;
        }

        table {
            border-collapse: collapse;
            width: 100%;
            min-width: 900px;
            background: #3a3a3a;
            color: #111;
        }

        th,
        td {
            border: 1px solid #acacac;
            padding: 1px 1px;
            text-align: center;
            vertical-align: middle;
        }

        thead th {
            position: sticky;
            top: 0;
            z-index: 3;
            background: var(--sticky);
            padding-top: 6px;
            padding-bottom: 6px;
        }

        .column-header-base,
        .column-header-exp1,
        .column-header-exp2,
        .column-header-exp3 {
            position: sticky;
            z-index: 2;
            text-align: center;
            width: 32px;
            min-width: 32px;
            max-width: 32px;
            font-size: .75rem;
        }

        .column-header-total,
        .column-header-known,
        .column-header-pct,
        .column-header-active {
            position: sticky;
            z-index: 2;
            text-align: center;
            width: 16px;
            min-width: 16px;
            max-width: 16px;
            font-size: .75rem;
        }

        .column-header-info {
            position: sticky;
            z-index: 2;
            text-align: center;
            width: 22px;
            min-width: 22px;
            max-width: 22px;
            font-size: .75rem;
        }

        .column-header-name {
            position: sticky;
            z-index: 2;
            text-align: left;
            width: 125px;
            font-size: .75rem;
        }

        .column-header-type {
            position: sticky;
            z-index: 2;
            text-align: left;
            width: 160px;
            font-size: .75rem;
        }

        .column-header-factions {
            min-width: 140px;
            color: #fff;
            font-size: .75rem;
            text-transform: uppercase;
            letter-spacing: .04em;
        }

        thead .column-header-base,
        thead .column-header-exp1,
        thead .column-header-exp2,
        thead .column-header-exp3,
        thead .column-header-total,
        thead .column-header-known,
        thead .column-header-pct,
        thead .column-header-active,
        thead .column-header-info,
        thead .column-header-name,
        thead .column-header-type,
        thead .column-header-factions {
            z-index: 4;
        }

        .column-cells-cardSet {
            color: #ffffff;
            font-size: .75rem;
            font-weight: 700;
            text-align: center;
            width: 32px;
        }

        .column-cells-metric {
            color: #ffffff;
            font-size: .75rem;
            font-weight: 700;
            text-align: center;
            background: #2f2f2f;
            width: 12px;
        }

        .column-cells-info {
            color: #ffffff;
            font-weight: 700;
            text-align: center;
            padding: 0;
        }

        .column-cells-name,
        .column-cells-type {
            color: #ffffff;
            font-size: .75rem;
            font-weight: 700;
            line-height: 1;
        }

        .name-cell {
            color: #ffffff;
            text-align: left;
            font-size: .75rem;
            font-weight: 700;
            line-height: 1;
        }

        .check-group {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            flex-wrap: nowrap;
            line-height: 1;
        }

        .check-group input {
            width: 20px;
            height: 20px;
            accent-color: #222;
            cursor: pointer;
            margin: 0;
            vertical-align: middle;
            transform: translateY(2px);
            touch-action: manipulation;
        }

        @media (pointer: coarse) {
            .check-group {
                gap: 4px;
                min-height: 20px;
                line-height: 1;
            }

            .check-group input {
                width: 20px;
                height: 20px;
            }
        }

        .tiny {
            font-size: .78rem;
            color: var(--muted);
        }

        .legend {
            display: flex;
            gap: 4px;
            flex-wrap: nowrap;
            align-items: center;
            margin-top: 0;
            overflow-x: auto;
            overflow-y: hidden;
            white-space: nowrap;
            -webkit-overflow-scrolling: touch;
        }

        .legend::-webkit-scrollbar {
            height: 6px;
        }

        .legend span {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: .86rem;
            background: rgba(255, 255, 255, .05);
            padding: 5px 10px;
            border-radius: 999px;
            border: 1px solid rgba(255, 255, 255, .12);
            cursor: pointer;
            user-select: none;
            transition: background .12s ease, border-color .12s ease, opacity .12s ease, transform .12s ease;
            flex: 0 0 auto;
            line-height: 1;
        }

        .legend span:hover {
            transform: translateY(-1px);
        }

        .legend span.inactive {
            opacity: .45;
        }

        .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            display: inline-block;
        }

        @media (max-width: 1100px) {
            .hero {
                grid-template-columns: 1fr;
            }

            .toolbar {
                grid-template-columns: repeat(2, minmax(140px, 1fr));
            }

            .summary-grid {
                grid-template-columns: 1fr;
            }
        }

        .info-btn {
            margin: 0 auto;
            border-radius: 50%;
            width: 12px;
            height: 12px;
            border: none;
            font-size: 9px;
            font-weight: 700;
            cursor: pointer;
            background: rgba(0, 0, 0, .35);
            color: #fff;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            vertical-align: middle;
            padding: 0;
        }

        .info-popup {
            position: absolute;
            background: #1e1e1e;
            color: #fff;
            padding: 14px 14px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, .15);
            font-size: 14px;
            line-height: 1.45;
            z-index: 1000;
            box-shadow: 0 6px 20px rgba(0, 0, 0, .4);
            width: min(320px, calc(100vw - 24px));
            white-space: normal;
        }

        .info-popup p {
            margin: 0 0 10px 0;
        }

        .info-popup p:last-child {
            margin-bottom: 0;
        }

        .move-armed {
            outline: 4px solid rgba(255, 255, 255, .5);
            outline-offset: -2px;
        }

        th.header-drop-target {
            outline: 4px dashed rgba(255, 255, 255, .35);
            outline-offset: -2px;
        }

        td.drop-target {
            outline: 4px dashed rgba(255, 255, 255, .35);
            outline-offset: -2px;
        }

        /* Big table mode: taller rows and larger headers */
        .table-scale-big th {
            padding-top: 6px;
            padding-bottom: 6px;
        }

        .table-scale-big .column-header-info,
        .table-scale-big .column-header-name,
        .table-scale-big .column-header-type,
        .table-scale-big .column-header-factions {
            font-size: 1.25rem;
        }

        .table-scale-big td {
            padding-top: 2px;
            padding-bottom: 2px;
        }

        .table-scale-big .check-group input {
            width: 20px;
            height: 20px;
            transform: translateY(2px);
        }

        .table-scale-big .column-cells-name,
        .table-scale-big .column-cells-type,
        .table-scale-big .name-cell {
            font-size: .9rem;
        }

        .table-scale-big td[data-move-rowid][data-move-source] {
            padding-left: 8px;
            padding-right: 8px;
        }

        /* Bigger table mode: even taller rows and larger headers */
        .table-scale-bigger th {
            padding-top: 10px;
            padding-bottom: 10px;
        }

        .table-scale-bigger .column-header-info,
        .table-scale-bigger .column-header-name,
        .table-scale-bigger .column-header-type,
        .table-scale-bigger .column-header-factions {
            font-size: 1.5rem;
        }

        .table-scale-bigger td {
            padding-top: 6px;
            padding-bottom: 6px;
        }

        .table-scale-bigger .check-group input {
            width: 24px;
            height: 24px;
            transform: translateY(3px);
        }

        .table-scale-bigger .column-cells-name,
        .table-scale-bigger .column-cells-type,
        .table-scale-bigger .name-cell {
            font-size: 1.15rem;
        }

        .table-scale-bigger td[data-move-rowid][data-move-source] {
            padding-left: 12px;
            padding-right: 12px;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>

    <div class="app">
        <section class="hero">
            <div class="card">
                <a class="other-option-btn" href="https://treacherytracker.com/" target="_blank">Other Option</a>

        <section class="table-wrap">

                <tbody id="trackerBody"></tbody>

        <input id="importFileInput" type="file" accept="application/json" style="display:none" />

            const searchText = `${row.name} ${row.type} ${row.category} ${row.info || ""}`.toLowerCase();
            const searchOk = !filters.search || searchText.includes(filters.search);
            const categoryOk = Array.isArray(filters.category)
                ? filters.category.includes(row.category)
                : filters.category === "All" || row.category === filters.category;
            const typeOk = filters.type === "All" || row.type === filters.type;
            const richeseOk = !row.richeseOnlyE2 || isRicheseActive();
            const expansionOk = row.id === "unknown" || expansions.some((expansion) => {
                const value = Number(row.setCounts[expansion.index]);
                return isExpansionActiveForRow(row, expansion) && Number.isFinite(value) && value > 0;
            });
            return searchOk && categoryOk && typeOk && expansionOk && richeseOk;
        }

            const current = Array.isArray(state.selectedCategories) && state.selectedCategories.length

                : [...new Set(rows.map((row) => row.category))];
            const exists = current.includes(category);

            if (exists) {
                if (current.length === 1) {
                    return;

                state.selectedCategories = current.filter((value) => value !== category);
            } else {
                state.selectedCategories = [...current, category];

            populateControls();
            renderTable();

        function cellKey(rowId, factionKey, index) {
            return `${rowId}__${factionKey}__${index}`;
        }

        function getRowBoxCount(row) {
            const total = expansions.reduce((sum, expansion) => {
                if (!isExpansionActiveForRow(row, expansion)) {
                    return sum;
                }

                const numericValue = Number(row.setCounts[expansion.index]);
                return Number.isFinite(numericValue) ? sum + numericValue : sum;
            }, 0);

            if (Number.isFinite(row.sharedExpansionCopies)) {
                return Math.min(total, row.sharedExpansionCopies);
            }

            return total;
        }

        function getRowBoxCountForFaction(row, factionKey) {
            const maxHandSize = factionHandLimits[factionKey] || 4;
            const renderMax = Math.min(maxHandSize, factionRenderMaxBoxes);

            if (row.id === "unknown") {
                if (factionKey === "deck" || factionKey === "discard") {
                    return 0;
                }
                return renderMax;
            }

            if (factionKey === "deck" || factionKey === "discard") {
                return getRowBoxCount(row);
            }

            return Math.min(getRowBoxCount(row), renderMax);
        }

            return rows.reduce((sum, row) => {
                const boxCount = getRowBoxCountForFaction(row, factionKey);
                let rowCount = 0;
                for (let index = 0; index < boxCount; index += 1) {
                    rowCount += state.checks[cellKey(row.id, factionKey, index)] ? 1 : 0;
                }
                return sum + rowCount;
            }, 0);

            return `<div class="check-group">${checks.join("")}</div>`;
